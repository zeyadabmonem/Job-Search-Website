<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobFinder</title>
</head>
<body>

  <!-- Top Bar -->
  <header>
    <img height="30"   src="logo.png" alt="JobFinder Logo" />
    <h1>JobFinder</h1>
  </header>

  <!-- Sign Up Card -->
  <form>
    <h2>Join JobFinder</h2>
    <p>Start your career journey or build your team today</p>

    <!-- Username -->
    <label for="username">Username</label>
    <input id="username" type="text" placeholder="ziadabdo123" />

    <!-- Email -->
    <label for="email">Email Address</label>
    <input id="email" type="email" placeholder="name@company.com" />

    <!-- Password -->
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="••••••••" />

    <!-- Confirm Password -->
    <label for="confirm">Confirm</label>
    <input id="confirm" type="password" placeholder="••••••••" />

    <!-- Company Admin Checkbox -->
    <input id="admin" type="checkbox" />
    <label for="admin">Register as Company Admin</label>

    <!-- Company Name -->
    <label for="company">Company Name</label>
    <input id="company" type="text" placeholder="TechSolutions Inc." />

    <!-- Submit -->
    <input type="submit" value="Sign Up">

    <!-- Login Link -->
    <p>Already have an account? <a href="#">Log In</a></p>
  </form>

  <!-- Bottom Navigation -->
  <nav>
    <a href="#">Home</a>
    <a href="#">Jobs</a>
    <a href="#">Applied</a>
    <a href="#">Profile</a>
    <a href="#">Logout</a>
  </nav>

</body>
</html>

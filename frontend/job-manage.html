<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Jobs – JobFinder Admin</title>
  <link rel="stylesheet" href="assets/css/nav.css" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/jobs.css" />
  <style>
    /* Extra styles specific to my-jobs page */
    .job-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

    .btn-delete {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: "DM Sans", sans-serif;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-delete:hover { background: #fee2e2; transform: translateY(-1px); }
  </style>
</head>
<body>

  <iframe src="nav.html" class="navbar-frame" scrolling="no" title="Navigation"></iframe>

  <div class="page-wrapper">
    <div class="container-900">

      <div class="page-header">
        <h2>My Jobs</h2>
        <a href="job-create.html" class="btn btn-primary" target="_top">+ Add New Job</a>
      </div>

      <div id="my-jobs-container"></div>

    </div>
  </div>

  <!-- Confirm delete dialog -->
  <div id="delete-overlay" style="
    display:none; position:fixed; inset:0; background:rgba(15, 23, 42, 0.6);
    z-index:1000; align-items:center; justify-content:center; backdrop-filter: blur(4px);">
    <div style="background:#fff; border-radius:18px; padding:32px; max-width:380px;
                width:90%; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); text-align:center;">
      <div style="background:#fee2e2; width:64px; height:64px; border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center;">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
      </div>
      <h3 style="font-size:1.25rem; font-weight:700; margin-bottom:10px; color:#1e293b;">Delete this job?</h3>
      <p style="font-size:0.95rem; color:#64748b; margin-bottom:28px; line-height:1.5;">
        This listing will be permanently removed. This action cannot be undone.
      </p>
      <div style="display:flex; gap:12px; justify-content:center;">
        <button class="btn btn-ghost" onclick="closeDelete()" style="padding:10px 24px;">Cancel</button>
        <button class="btn btn-primary" id="confirm-delete-btn"
                style="background:#dc2626; box-shadow:none; padding:10px 24px; min-width:100px;">Delete</button>
      </div>
    </div>
  </div>

  <script src="assets/js/storage.js"></script>
  <script>
    var user = JobStorage.getUser();
    if (!user || user.role !== 'admin') {
      window.top.location.href = 'login.html';
    }

    var deleteTarget = null;

    function renderJobs() {
      var container = document.getElementById('my-jobs-container');
      
      fetch('http://127.0.0.1:8000/api/jobs/')
        .then(response => response.json())
        .then(jobs => {
          container.innerHTML = '';

          if (jobs.length === 0) {
            container.innerHTML =
              '<div class="empty-state">' +
                '<div class="empty-state-icon"></div>' +
                '<p>No jobs posted yet.</p>' +
                '<p><a href="job-create.html" target="_top">Post your first job listing</a>.</p>' +
              '</div>';
            return;
          }

          // Show newest first
          jobs.slice().reverse().forEach(function (job) {
            var card = document.createElement('div');
            card.className = 'job-card';
            card.innerHTML =
              '<div class="job-info">' +
                '<h3>' + job.title + '</h3>' +
                '<p class="job-meta">' +
                  job.company + ' &nbsp;·&nbsp; $' + Number(job.salary).toLocaleString() + '/mo' +
                  ' &nbsp;·&nbsp; ' + job.years + '+ yrs experience' +
                '</p>' +
                '<span class="badge badge-' + (job.status ? job.status.toLowerCase() : 'open') + '">' +
                  '<span class="badge-dot"></span>' +
                  (job.status && job.status.toLowerCase() === 'closed' ? 'Closed' : 'Open') +
                '</span>' +
              '</div>' +
              '<div class="job-actions">' +
                '<button class="btn-view">View Details</button>' +
                '<button class="btn-edit" style="background:#f0f9ff; color:#0369a1; border:1px solid #bae6fd; padding:8px 16px; border-radius:8px; font-size:0.82rem; font-weight:600; cursor:pointer; font-family:\'DM Sans\', sans-serif; transition:background 0.2s, transform 0.15s;">Edit</button>' +
                '<button class="btn-toggle-status" style="background:#f0fdf4; color:#15803d; border:1px solid #bbf7d0; padding:8px 16px; border-radius:8px; font-size:0.82rem; font-weight:600; cursor:pointer; font-family:\'DM Sans\', sans-serif; transition:background 0.2s, transform 0.15s;">' + 
                  (job.status === 'Open' ? 'Close Job' : 'Open Job') + 
                '</button>' +
                '<button class="btn-delete">Delete</button>' +
              '</div>';

            card.querySelector('.btn-view').addEventListener('click', function () {
              window.location.href = 'job-details.html?id=' + job.id;
            });

            card.querySelector('.btn-edit').addEventListener('click', function () {
              window.location.href = 'job-edit.html?id=' + job.id;
            });

            card.querySelector('.btn-toggle-status').addEventListener('click', function () {
              toggleJobStatus(job.id, job.status);
            });

            card.querySelector('.btn-delete').addEventListener('click', function () {
              deleteTarget = job.id;
              document.getElementById('delete-overlay').style.display = 'flex';
            });

            container.appendChild(card);
          });
        })
        .catch(err => {
          console.error('Error fetching jobs:', err);
          container.innerHTML = '<div class="empty-state"><p>Error loading jobs.</p></div>';
        });
    }

    /* Confirm delete */
    document.getElementById('confirm-delete-btn').addEventListener('click', function () {
      if (deleteTarget !== null) {
        var idToDelete = deleteTarget;
        var btn = document.getElementById('confirm-delete-btn');
        var originalText = btn.textContent;
        
        // Show loading state
        btn.disabled = true;
        btn.textContent = 'Deleting...';
        btn.style.opacity = '0.7';
        
        var token = JobStorage.getToken();
        fetch('http://127.0.0.1:8000/api/jobs/' + idToDelete + '/', {
          method: 'DELETE',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          }
        })
        .then(response => {
          if (response.ok || response.status === 204) {
            // Success
            if (window.JobStorage && JobStorage.deleteJob) JobStorage.deleteJob(idToDelete);
            closeDelete();
            renderJobs(); // Refresh the list
          } else {
            alert('Failed to delete job. Please try again.');
            btn.disabled = false;
            btn.textContent = originalText;
            btn.style.opacity = '1';
          }
        })
        .catch(err => {
          console.error('Error deleting job:', err);
          alert('Network error occurred while trying to delete.');
          btn.disabled = false;
          btn.textContent = originalText;
          btn.style.opacity = '1';
        });
      }
    });

    function toggleJobStatus(jobId, currentStatus) {
      var newStatus = currentStatus === 'Open' ? 'Closed' : 'Open';
      var token = JobStorage.getToken();
      
      fetch('http://127.0.0.1:8000/api/jobs/' + jobId + '/', {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ status: newStatus })
      })
      .then(response => {
        if (!response.ok) throw new Error('Failed to toggle status');
        renderJobs();
      })
      .catch(err => {
        console.error('Error toggling status:', err);
        alert('Could not update job status.');
      });
    }

    function closeDelete() {
      deleteTarget = null;
      document.getElementById('delete-overlay').style.display = 'none';
    }

    document.getElementById('delete-overlay').addEventListener('click', function (e) {
      if (e.target === this) closeDelete();
    });

    renderJobs();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Jobs – JobFinder Admin</title>
  <link rel="stylesheet" href="assets/css/nav.css" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/jobs.css" />
  <style>
    /* Extra styles specific to my-jobs page */
    .job-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }

    .btn-delete {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: "DM Sans", sans-serif;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-delete:hover { background: #fee2e2; transform: translateY(-1px); }
  </style>
</head>
<body>

  <iframe src="nav.html" class="navbar-frame" scrolling="no" title="Navigation"></iframe>

  <div class="page-wrapper">
    <div class="container-900">

      <div class="page-header">
        <h2>My Jobs</h2>
        <a href="job-create.html" class="btn btn-primary" target="_top">+ Add New Job</a>
      </div>

      <div id="my-jobs-container"></div>

    </div>
  </div>

  <!-- Confirm delete dialog -->
  <div id="delete-overlay" style="
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4);
    z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:14px; padding:32px; max-width:360px;
                width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.2); text-align:center;">
      <div style="font-size:2.5rem; margin-bottom:12px;"></div>
      <h3 style="font-size:1.1rem; font-weight:700; margin-bottom:8px;">Delete this job?</h3>
      <p style="font-size:0.875rem; color:#64748b; margin-bottom:24px;">
        This action cannot be undone.
      </p>
      <div style="display:flex; gap:10px; justify-content:center;">
        <button class="btn btn-ghost" onclick="closeDelete()">Cancel</button>
        <button class="btn btn-primary" id="confirm-delete-btn"
                style="background:#dc2626; box-shadow:none;">Delete</button>
      </div>
    </div>
  </div>

  <script src="assets/js/storage.js"></script>
  <script>
    var deleteTarget = null;

    function renderJobs() {
      var container = document.getElementById('my-jobs-container');
      
      fetch('http://localhost:8000/api/jobs/')
        .then(response => response.json())
        .then(jobs => {
          container.innerHTML = '';

          if (jobs.length === 0) {
            container.innerHTML =
              '<div class="empty-state">' +
                '<div class="empty-state-icon"></div>' +
                '<p>No jobs posted yet.</p>' +
                '<p><a href="job-create.html" target="_top">Post your first job listing</a>.</p>' +
              '</div>';
            return;
          }

          // Show newest first
          jobs.slice().reverse().forEach(function (job) {
            var card = document.createElement('div');
            card.className = 'job-card';
            card.innerHTML =
              '<div class="job-info">' +
                '<h3>' + job.title + '</h3>' +
                '<p class="job-meta">' +
                  job.company + ' &nbsp;·&nbsp; $' + Number(job.salary).toLocaleString() + '/mo' +
                  ' &nbsp;·&nbsp; ' + job.years + '+ yrs experience' +
                '</p>' +
                '<span class="badge badge-' + (job.status ? job.status.toLowerCase() : 'open') + '">' +
                  '<span class="badge-dot"></span>' +
                  (job.status && job.status.toLowerCase() === 'closed' ? 'Closed' : 'Open') +
                '</span>' +
              '</div>' +
              '<div class="job-actions">' +
                '<button class="btn-view">View Details →</button>' +
                '<button class="btn-delete">Delete</button>' +
              '</div>';

            card.querySelector('.btn-view').addEventListener('click', function () {
              window.location.href = 'job-details.html?id=' + job.id;
            });

            card.querySelector('.btn-delete').addEventListener('click', function () {
              deleteTarget = job.id;
              document.getElementById('delete-overlay').style.display = 'flex';
            });

            container.appendChild(card);
          });
        })
        .catch(err => {
          console.error('Error fetching jobs:', err);
          container.innerHTML = '<div class="empty-state"><p>Error loading jobs.</p></div>';
        });
    }

    /* Confirm delete */
    document.getElementById('confirm-delete-btn').addEventListener('click', function () {
      if (deleteTarget !== null) {
        // Optimistically close overlay
        closeDelete();
        
        fetch('http://localhost:8000/api/jobs/' + deleteTarget + '/', {
          method: 'DELETE'
        })
        .then(response => {
          if (response.ok || response.status === 204) {
            renderJobs(); // Refresh the list
          } else {
            alert('Failed to delete job. Please try again.');
          }
        })
        .catch(err => {
          console.error('Error deleting job:', err);
          alert('Network error occurred while trying to delete.');
        });
      } else {
        closeDelete();
      }
    });

    function closeDelete() {
      deleteTarget = null;
      document.getElementById('delete-overlay').style.display = 'none';
    }

    document.getElementById('delete-overlay').addEventListener('click', function (e) {
      if (e.target === this) closeDelete();
    });

    renderJobs();
  </script>

</body>
</html>

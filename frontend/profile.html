<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile – JobFinder</title>
  <link rel="stylesheet" href="assets/css/nav.css" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/profile.css" />
</head>
<body>

  <iframe src="nav.html" class="navbar-frame" scrolling="no" title="Navigation"></iframe>

  <!-- Redirect to login if not authenticated -->
  <div class="page-wrapper">
    <div class="container-700">
      <div class="card" id="profile-card" style="display:none;">

        <!-- Profile hero -->
        <div class="profile-hero">
          <div class="profile-avatar" id="profile-avatar">?</div>
          <div class="profile-info">
            <h1 class="profile-name" id="profile-name">—</h1>
            <p class="profile-email" id="profile-email">—</p>
            <span class="profile-role-badge" id="profile-role-badge">—</span>
          </div>
        </div>

        <!-- Body -->
        <div class="profile-body">

          <!-- Account info section -->
          <div class="profile-section">
            <h2 class="section-title">Account Information</h2>

            <div class="info-row">
              <span class="info-row-icon"></span>
              <div>
                <div class="info-row-label">Full Name</div>
                <div class="info-row-value" id="info-name">—</div>
              </div>
            </div>

            <div class="info-row">
              <span class="info-row-icon"></span>
              <div>
                <div class="info-row-label">Email Address</div>
                <div class="info-row-value" id="info-email">—</div>
              </div>
            </div>

            <div class="info-row">
              <span class="info-row-icon"></span>
              <div>
                <div class="info-row-label">Account Role</div>
                <div class="info-row-value" id="info-role">—</div>
              </div>
            </div>

            <div class="info-row" id="info-company-row" style="display:none;">
              <span class="info-row-icon"></span>
              <div>
                <div class="info-row-label">Company</div>
                <div class="info-row-value" id="info-company">—</div>
              </div>
            </div>
          </div>

          <!-- Activity section -->
          <div class="profile-section">
            <h2 class="section-title">Activity</h2>

            <div class="info-row">
              <span class="info-row-icon"></span>
              <div>
                <div class="info-row-label">Jobs Applied</div>
                <div class="info-row-value" id="info-applied">0</div>
              </div>
            </div>
          </div>

          <!-- Actions -->
          <div class="profile-section">
            <h2 class="section-title">Quick Actions</h2>
            <div class="profile-actions">
              <a href="applications.html" class="btn btn-outline" id="view-apps-btn">
                My Applications
              </a>
              <a href="search.html" class="btn btn-ghost" id="search-btn">
                Search Jobs
              </a>
              <button class="btn btn-ghost" style="color:#ef4444; border-color:#fecaca;"
                      onclick="if(window.JobStorage) JobStorage.logout(); else { window.location.href='login.html'; }">
                Logout
              </button>
            </div>
          </div>

        </div>
      </div>

      <!-- Not logged in fallback -->
      <div id="no-user-msg" style="display:none; text-align:center; padding:80px 20px;">
        <div style="font-size:3rem; margin-bottom:16px; opacity:0.4;"></div>
        <p style="font-size:1.1rem; color:#64748b; margin-bottom:8px;">You are not logged in.</p>
        <a href="login.html" class="btn btn-primary" style="margin-top:12px;">Go to Login</a>
      </div>
    </div>
  </div>

  <script src="assets/js/storage.js"></script>
  <script>
    var token = JobStorage.getToken();

    if (!token) {
      document.getElementById('no-user-msg').style.display = 'block';
    } else {
      document.getElementById('profile-card').style.display = 'block';

      fetch('http://127.0.0.1:8000/api/auth/profile/', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(res => res.json())
      .then(user => {
        /* Fill hero */
        document.getElementById('profile-avatar').textContent = (user.first_name || user.username || 'U')[0].toUpperCase();
        document.getElementById('profile-name').textContent   = user.first_name || user.username || 'User';
        document.getElementById('profile-email').textContent  = user.email;

        var roleLabel = user.role === 'admin' ? 'Company Admin' : 'Job Seeker';
        document.getElementById('profile-role-badge').textContent = roleLabel;

        /* Fill info rows */
        document.getElementById('info-name').textContent  = user.first_name || user.username;
        document.getElementById('info-email').textContent = user.email;
        document.getElementById('info-role').textContent  = user.role === 'admin' ? 'Company Admin' : 'Job Seeker';

        if (user.company) {
          document.getElementById('info-company-row').style.display = 'flex';
          document.getElementById('info-company').textContent = user.company;
        }

        /* Activity (using a separate fetch for app count if needed, but for now just setting to 0 or keeping it) */
        if (user.role === 'seeker') {
           fetch('http://127.0.0.1:8000/api/my-applications/', {
              headers: { 'Authorization': 'Bearer ' + token }
           })
           .then(res => res.json())
           .then(apps => {
              document.getElementById('info-applied').textContent = apps.length;
           });
        } else {
           document.getElementById('info-applied').parentElement.parentElement.style.display = 'none';
        }

        /* Adjust quick actions for admin */
        if (user.role === 'admin') {
          document.getElementById('view-apps-btn').href        = 'job-manage.html';
          document.getElementById('view-apps-btn').textContent = 'My Jobs';
          document.getElementById('search-btn').href           = 'job-create.html';
          document.getElementById('search-btn').textContent    = 'Add Job';
        }
      })
      .catch(err => {
        console.error(err);
        alert('Error loading profile.');
      });
    }
  </script>

</body>
</html>

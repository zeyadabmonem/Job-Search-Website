<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Available Jobs – JobFinder</title>
  <link rel="stylesheet" href="assets/css/nav.css" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/jobs.css" />
</head>
<body>

  <iframe src="nav.html" class="navbar-frame" scrolling="no" title="Navigation"></iframe>

  <div class="page-wrapper">
    <div class="container-900">

      <div class="page-header">
        <h2>Available Jobs</h2>
        <span class="jobs-count" id="jobs-count">0 jobs</span>
      </div>

      <div id="jobs-container"></div>

    </div>
  </div>

  <script src="assets/js/storage.js"></script>
  <script>
    var container = document.getElementById('jobs-container');
    var countEl = document.getElementById('jobs-count');

    // Fetch jobs from backend (only open jobs)
    fetch('http://127.0.0.1:8000/api/jobs/?status=Open')
      .then(response => response.json())
      .then(jobs => {
        /* Update count pill */
        countEl.textContent = jobs.length + (jobs.length === 1 ? ' job' : ' jobs');

        if (jobs.length === 0) {
          container.innerHTML =
            '<div class="empty-state">' +
              '<div class="empty-state-icon"></div>' +
              '<p>No jobs posted yet.</p>' +
              '<p>Check back soon or <a href="search.html">search for specific roles</a>.</p>' +
            '</div>';
        } else {
          jobs.forEach(function (job) {
            var card = document.createElement('div');
            card.className = 'job-card';
            card.innerHTML =
              '<div class="job-info">' +
                '<h3>' + job.title + '</h3>' +
                '<p class="job-meta">' +
                  job.company + ' &nbsp;·&nbsp; $' + Number(job.salary).toLocaleString() + '/mo' +
                  ' &nbsp;·&nbsp; ' + job.years + '+ yrs experience' +
                '</p>' +
                '<span class="badge badge-' + job.status.toLowerCase() + '">' +
                  '<span class="badge-dot"></span>' +
                  (job.status.toLowerCase() === 'open' ? 'Open' : 'Closed') +
                '</span>' +
              '</div>' +
              '<button class="btn-view">View Details →</button>';

            /* Navigate to job details on button click */
            card.querySelector('.btn-view').addEventListener('click', function () {
              window.location.href = 'job-details.html?id=' + job.id;
            });

            container.appendChild(card);
          });
        }
      })
      .catch(error => {
        console.error('Error fetching jobs:', error);
        container.innerHTML = '<div class="empty-state"><p>Error loading jobs. Ensure backend is running.</p></div>';
      });
  </script>

</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobFinder | Login</title>
    <link rel="stylesheet" href="../assets/css/main.css" />
  </head>
  <body>
    <header id="app-navbar"></header>
    <main class="section">
      <div class="container" style="max-width: 520px;">
        <form id="login-form" class="card stack-md">
          <h1>Login</h1>
          <label class="stack-sm">Email <input class="input" name="email" type="email" required /></label>
          <label class="stack-sm">Password <input class="input" name="password" type="password" required /></label>
          <button class="btn btn-primary" type="submit">Sign in</button>
          <p id="login-msg" class="muted"></p>
        </form>
      </div>
    </main>
    <script type="module" src="../assets/js/pages/login.page.js"></script>
  </body>
</html>

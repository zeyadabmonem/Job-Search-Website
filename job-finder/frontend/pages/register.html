<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobFinder | Register</title>
    <link rel="stylesheet" href="../assets/css/main.css" />
  </head>
  <body>
    <header id="app-navbar"></header>
    <main class="section">
      <div class="container auth-wrap">
        <form id="register-form" class="card stack-md">
          <h1>Create account</h1>
          <label class="field">Full name<input class="input" type="text" name="name" required /></label>
          <label class="field">Email<input class="input" type="email" name="email" required /></label>
          <label class="field">Password<input class="input" type="password" name="password" required /></label>
          <label class="field">Role
            <select class="input" name="role">
              <option value="user">Job Seeker</option>
              <option value="admin">Company Admin</option>
            </select>
          </label>
          <button class="btn btn-primary" type="submit">Create account</button>
          <p id="register-feedback" class="muted"></p>
        </form>
      </div>
    </main>
    <script type="module" src="../assets/js/pages/register.page.js"></script>
  </body>
</html>

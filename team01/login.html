<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - JobFinder</title>
</head>
<body>
    <!--Logo-->
    <header>
        <img src="icons/briefcase.png" height = "20" width ="20" alt="icon"> <span>JobFinder</span>
        <br><br>
    </header>

    <!--Nav bar-->
    <nav>
        <a href="homePage.html">
            <img src="icons/home.png" alt="homeIcon" height = "20" width ="20"> Home
        </a>
        <a href="jobsPage.html">
                <img src="icons/employee.png" alt="jobIcon" height = "20" width ="20"> Jobs
        </a>
        <a href="appliedJobsPage.html">
                <img src="icons/applied.png" alt="appliedIcon" height = "20" width ="20"> Applied jobs
        </a>
        <a href="profilePage.html">
                <img src="icons/account.png" alt="profileIcon" height = "20" width ="20"> Profile
        </a>
        <a href="logout.html">
                <img src="icons/logout.png" alt="logoutIcon" height = "20" width ="20"> Logout
        </a>
    </nav>
 
    <h1>Log in</h1>
    <form action="homePage.html" method = "post">
        <fieldset>
            <legend>Enter your email and password</legend>
            <!--email-->
            <div>
                <label for="user"><img height = "20" width ="20" src="icons/user.png" alt="user"> Email</label>
                <input type="email" name="email" id="user" placeholder="example@gmail.com" required autofocus>
            </div>
            <br>
            <!--password-->
            <div>
                <label for="pass"><img height = "20" width ="20" src="icons/padlock.png" alt="pass"> Password</label>
                <input type="password" name = "password" id = "pass" placeholder="********" minlength="8" required> 
                <button><img height = "20" width ="20" src="icons/eye.png" alt="ey"></button>
            </div>
            <!--remember me-->
            <div>
                <input type="checkbox" name="Remember?" id="cb" value="yes">
                <label for="cb">Remember me</label>
            </div>
            <!--forgetPass-SubmitButton-DonHaveAcc-->
            <br>
            <a href="forgetPassPage.html">forget my password</a>
            <br><br>
            <input type="submit" value="Login">
            <br><br> <span>I don't have <b>account </b></span><a href="SignUp.html">Sign Up</a>
        </fieldset>
    </form>

    <footer>
        <br>
        <a href="PPTSHC.html">privacy policy terms of service help center</a>
        <br><br>
    </footer>
    
    
</body>
</html>

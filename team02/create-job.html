<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Job - Admin</title>
</head>
<body>

    <header>
        <nav>
            <a href="admin-dashboard.html">Dashboard</a> | 
            <a href="create-job.html">Create Job</a> | 
            <a href="job-details.html">Jobs</a> | 
            <a href="#">Log out</a>
        </nav>
    </header>
    <hr>

    <main>
        <h2>Creating Job :</h2>

        <form action="admin-dashboard.html" method="POST">
            <table>
                <tr>
                    <td><label for="jobtitle">Job Title:</label></td>
                    <td><input required name="jobtitle" id="jobtitle" type="text"></td>
                </tr>
                <tr>
                    <td><label for="company">Company Name:</label></td>
                    <td><input required name="company" id="company" type="text"></td>
                </tr>
                <tr>
                    <td><label for="salary">Salary:</label></td>
                    <td><input required id="salary" name="salary" type="number"></td>
                </tr>
                <tr>
                    <td><label for="years">Years Of Experience:</label></td>
                    <td><input required id="years" name="years" type="number"></td>
                </tr>
                <tr>
                    <td><label for="description">Description:</label></td>
                    <td><textarea required name="description" id="description" rows="4" cols="30"></textarea></td>
                </tr>
                <tr>
                    <td><label for="status">Job Status:</label></td>
                    <td>
                        <select required id="status" name="status">
                            <option value="open">Open</option>
                            <option value="closed">Closed</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td></td>
                    <td><br><button type="submit">Create Job</button></td>
                </tr>
            </table>
        </form>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Applications – JobFinder</title>
  <link rel="stylesheet" href="nav.css" />
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="applied-jobs.css" />
</head>
<body>

  <iframe src="nav.html" class="navbar-frame" scrolling="no" title="Navigation"></iframe>

  <div class="page-wrapper">
    <div class="container-900">

      <div class="page-header">
        <h2>My Applications</h2>
      </div>

      <div id="applied-container"></div>

    </div>
  </div>

  <script src="storage.js"></script>
  <script>
    var container = document.getElementById('applied-container');
    var jobs = JobStorage.getAppliedJobs();

    if (jobs.length === 0) {
      container.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-state-icon"></div>' +
          '<p>No applications yet.</p>' +
          '<p>Browse <a href="jobs.html">available jobs</a> and start applying.</p>' +
        '</div>';
    } 
    else {
      jobs.slice().reverse().forEach(function(job) {
        var card = document.createElement('div');
        card.className = 'app-card';

        var dateStr = '';
        if (job.appliedAt) {
          var d = new Date(job.appliedAt);
          dateStr = 'Applied on ' + d.toLocaleDateString('en-US', {
            year: 'numeric', month: 'short', day: 'numeric'
          });
        }

        card.innerHTML =
          '<div class="app-info">' +
            '<h3>' + job.title + '</h3>' +

            '<p class="app-meta">' +
              job.company + ' - $' + Number(job.salary).toLocaleString() + ' per month - ' +
              job.years + '+ years of experience' +
            '</p>' +

            (dateStr ? '<p class="app-date">' + dateStr + '</p>' : '') +
          '</div>' +

          '<span class="applied-tag">✓ Applied</span>';

        container.appendChild(card);
      });
    }
  </script>

</body>
</html>
